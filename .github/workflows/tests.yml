name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
    - uses: actions/checkout@v6
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install PDM
      run: |
        python -m pip install --upgrade pip
        pip install pdm
    - name: Install dependencies
      run: |
        pdm python install ${{ matrix.python-version }}
        pdm install
    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        pdm run flake8 . --config=flake8rc --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        pdm run flake8 . --config=flake8rc --count --exit-zero --max-complexity=100 --max-line-length=127 --statistics
    - name: Run tests
      run: |
        pdm run pytest tests/ -v
