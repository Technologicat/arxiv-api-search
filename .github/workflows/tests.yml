name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
    - uses: actions/checkout@v6
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install PDM
      run: |
        python -m pip install --upgrade pip
        pip install pdm
    - name: Install dependencies
      run: |
        pdm python install ${{ matrix.python-version }}
        pdm install
    - name: Lint with ruff
      run: pdm run ruff check . --ignore SIM103
    - name: Lint advisories (non-blocking)
      run: pdm run ruff check . --select SIM103 || true
    - name: Run tests
      run: |
        pdm run pytest tests/ -v
